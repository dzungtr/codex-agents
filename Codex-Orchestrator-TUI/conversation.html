<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>codex — session</title>
<style>
  :root {
    --bg:          oklch(13% 0.006 255);
    --bg-elevated: oklch(16% 0.007 255);
    --surface:     oklch(18% 0.008 255);
    --fg:          oklch(94% 0.004 255);
    --muted:       oklch(64% 0.01 255);
    --faint:       oklch(46% 0.01 255);
    --border:      oklch(34% 0.012 255);
    --accent:      oklch(80% 0.1 200);
    --accent-soft: oklch(80% 0.1 200 / 0.14);
    --success:     oklch(72% 0.15 150);
    --warn:        oklch(78% 0.15 85);
    --danger:      oklch(63% 0.19 25);
    --font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    color: var(--fg);
    font: 14px/1.5 var(--font-mono);
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; justify-content: center; padding: 28px; min-height: 100vh; }

  .term-window {
    display: flex; flex-direction: column;
    width: 100%; max-width: 1180px; min-height: 640px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 40px 90px rgba(0,0,0,0.5);
  }
  .term-titlebar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
  }
  .back-link {
    flex: 0 0 auto;
    background: transparent; border: 1px solid var(--border); border-radius: 5px;
    color: var(--muted); font: 12px var(--font-mono);
    padding: 4px 9px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .back-link:hover { color: var(--fg); border-color: var(--muted); }
  .back-link kbd { margin: 0; }

  .term-title { flex: 1; text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 0.04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .titlebar-spacer { flex: 0 0 auto; width: 24px; }

  .conv-body { display: flex; flex: 1; min-height: 0; }

  .conv-sidebar {
    width: 250px; flex: 0 0 auto;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 6px 0;
  }
  .conv-sidebar::-webkit-scrollbar { width: 8px; }
  .conv-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar-row { display: flex; flex-direction: column; gap: 3px; padding: 9px 14px; cursor: pointer; }
  .sidebar-row:hover { background: var(--surface); }
  .sidebar-row.is-current { background: var(--accent-soft); }
  .sidebar-row-title {
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar-row-meta {
    font-size: 11px; color: var(--faint); padding-left: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar-status-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
  .sidebar-row.is-open .sidebar-status-dot { background: var(--warn); animation: pulse 2.2s ease-in-out infinite; }
  .sidebar-row.is-finished .sidebar-status-dot { background: var(--success); }

  .conv-main { display: flex; flex-direction: column; flex: 1; min-width: 0; }

  .conv-info-panel {
    margin: 14px 16px 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12.5px;
  }
  .conv-info-head { display: flex; align-items: baseline; gap: 9px; }
  .conv-info-head .prompt-glyph { color: var(--muted); }
  .conv-info-head strong { color: var(--fg); font-weight: 600; font-size: 13.5px; }
  .conv-info-row { color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px 20px; margin-top: 7px; }
  .info-label { color: var(--faint); margin-right: 5px; }
  .info-value { color: var(--fg); }
  .status-line { display: flex; align-items: center; gap: 7px; margin-top: 9px; }
  .status-line .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-line.is-open .status-dot { background: var(--warn); animation: pulse 2.2s ease-in-out infinite; }
  .status-line.is-finished .status-dot { background: var(--success); }
  .status-line strong { color: var(--fg); font-weight: 600; }
  .status-line .muted { color: var(--faint); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.32; } }
  .mention { color: var(--accent); }

  .transcript { flex: 1; overflow-y: auto; padding: 22px 26px; display: flex; flex-direction: column; gap: 18px; }
  .transcript::-webkit-scrollbar { width: 8px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-assistant { max-width: 70ch; }
  .msg-role { font-size: 11px; letter-spacing: 0.02em; color: var(--faint); margin-bottom: 4px; font-weight: 600; }
  .msg-text { color: var(--fg); font-size: 13.5px; white-space: pre-wrap; }

  .msg-user {
    margin: 0 -26px; padding: 8px 26px;
    background: var(--bg-elevated);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .msg-user .row-prompt { color: var(--muted); }
  .msg-user .msg-text { flex: 1; margin: 0; }

  .msg-tool {
    max-width: 70ch;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
  }
  .tool-cmd { color: var(--warn); font-size: 12.5px; margin-bottom: 6px; }
  .tool-output { margin: 0; color: var(--faint); font-size: 12px; white-space: pre-wrap; }

  .composer {
    display: flex; align-items: flex-end; gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
  }
  .composer-prompt { color: var(--accent); padding-bottom: 8px; }
  .composer textarea {
    flex: 1; resize: none;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font: 13.5px var(--font-mono);
    outline: none; max-height: 160px;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .composer textarea::placeholder { color: var(--faint); }
  .btn-accent {
    font: 12.5px var(--font-mono);
    padding: 9px 16px; border-radius: 6px; cursor: pointer;
    background: var(--accent-soft); color: var(--accent);
    border: 1px solid color-mix(in oklch, var(--accent) 45%, var(--border));
  }
  .btn-accent:hover { background: color-mix(in oklch, var(--accent) 24%, transparent); }

  .term-footer {
    display: flex; gap: 22px; flex-wrap: wrap;
    padding: 11px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--faint); font-size: 12px;
  }
  kbd {
    display: inline-block;
    font: 11px var(--font-mono);
    color: var(--muted);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    margin-right: 4px;
  }

  .not-found {
    width: 100%; max-width: 480px; margin: auto;
    text-align: center; color: var(--muted);
  }
  .not-found a { color: var(--accent); }
  .not-found[hidden] { display: none; }
</style>
</head>
<body>

  <div class="term-window" data-od-id="term-window">
    <div class="term-titlebar" data-od-id="term-titlebar">
      <button type="button" class="back-link" id="back-btn" data-od-id="back-to-sessions">← sessions <kbd>Esc</kbd></button>
      <div class="term-title" id="thread-title">codex</div>
      <div class="titlebar-spacer" aria-hidden="true"></div>
    </div>

    <div class="conv-body" data-od-id="conversation-body">
      <aside class="conv-sidebar" id="conv-sidebar" data-od-id="conversation-sidebar"></aside>

      <div class="conv-main">
        <div class="conv-info-panel" id="conv-meta" data-od-id="conversation-meta"></div>

        <main class="transcript" id="transcript" data-od-id="transcript"></main>

        <div class="composer" data-od-id="composer">
          <span class="composer-prompt">›</span>
          <textarea id="composer-input" rows="1" placeholder="Continue this thread…" data-od-id="composer-input"></textarea>
          <button type="button" class="btn-accent" id="send-btn" data-od-id="send-button">Send</button>
        </div>
      </div>
    </div>

    <footer class="term-footer" data-od-id="keybind-footer">
      <span><kbd>Esc</kbd>back to sessions</span>
      <span><kbd>↑↓</kbd><kbd>jk</kbd>switch thread</span>
      <span><kbd>⏎</kbd>send</span>
      <span><kbd>⇧⏎</kbd>newline</span>
    </footer>
  </div>

  <div class="not-found" id="not-found" hidden data-od-id="thread-not-found">
    <p>Session not found — it may have been removed.</p>
    <a href="index.html" data-od-id="not-found-back-link">← Back to sessions</a>
  </div>

<script>
  var STORAGE_KEY = 'codex-orchestrator-threads-v1';

  function seedThreads() {
    var now = Date.now();
    var ago = function (mins) { return now - mins * 60000; };
    return [
      {
        id: 't3', title: 'Refactor drainer', repo: 'infra/drainer', branch: 'refactor-drainer',
        model: 'claude-opus-4.8', profile: 'reviewer', status: 'open',
        createdAt: ago(96), updatedAt: ago(3),
        messages: [
          { role: 'user', text: 'The drainer is falling over under backpressure once queue depth passes 10k. Let’s shed load instead of OOMing.' },
          { role: 'assistant', text: 'Reading server/drainer.go — the channel buffer is unbounded today. Switching to a bounded channel with a shed-oldest policy and exposing queue_depth as a gauge.' },
          { role: 'tool', cmd: 'go test ./server/... -run Drainer', output: '--- PASS: TestDrainerShedsOldestUnderPressure (0.02s)\n--- PASS: TestDrainerGaugeReportsDepth (0.01s)\nPASS' },
          { role: 'assistant', text: 'Backpressure test passes locally. Want a circuit breaker on the downstream sink too, or keep this PR scoped to the drainer itself?' }
        ]
      },
      {
        id: 't2', title: 'Add dark mode', repo: 'web/app', branch: 'add-dark-mode',
        model: 'claude-sonnet-5', profile: 'default', status: 'open',
        createdAt: ago(140), updatedAt: ago(22),
        messages: [
          { role: 'user', text: 'Add a dark mode toggle to Settings — should respect prefers-color-scheme by default.' },
          { role: 'assistant', text: 'I’ll set a --theme custom property on :root, add a toggle in Settings, and persist the choice to localStorage, falling back to prefers-color-scheme when nothing is stored.' },
          { role: 'tool', cmd: 'grep -r "prefers-color-scheme" src/styles', output: 'src/styles/tokens.css:3:@media (prefers-color-scheme: dark) {' },
          { role: 'assistant', text: 'Toggle is wired up. Should it live in Settings only, or also in the top nav for quick access?' }
        ]
      },
      {
        id: 't1', title: 'Fix auth hook', repo: 'web/app', branch: 'fix-auth-hook',
        model: 'claude-sonnet-5', profile: 'default', status: 'finished',
        createdAt: ago(210), updatedAt: ago(58),
        messages: [
          { role: 'user', text: 'useAuth throws "Cannot read token of undefined" right after a refresh — can you take a look?' },
          { role: 'assistant', text: 'src/hooks/useAuth.ts:42 reads res.data.token before checking res.ok. Adding a guard plus a single retry on 401.' },
          { role: 'tool', cmd: 'npm test -- useAuth', output: 'PASS  src/hooks/useAuth.test.ts\n  ✓ refreshes token before expiry (12ms)\n  ✓ retries once on 401 (4ms)\n\nTest Suites: 1 passed, 1 total' },
          { role: 'assistant', text: 'Fixed — added the response.ok guard and a single 401 retry. Tests are green and pushed to fix-auth-hook.' },
          { role: 'user', text: 'Nice, merging now.' }
        ]
      },
      {
        id: 't4', title: 'Write ingest tests', repo: 'data/ingest', branch: 'write-ingest-tests',
        model: 'claude-haiku-4.5', profile: 'yolo', status: 'finished',
        createdAt: ago(260), updatedAt: ago(190),
        messages: [
          { role: 'user', text: 'We have almost no coverage on the ingest pipeline. Add unit tests for the CSV and Parquet readers.' },
          { role: 'assistant', text: 'Added tests for csv_reader.py and parquet_reader.py covering malformed rows, empty files, and schema mismatches.' },
          { role: 'tool', cmd: 'pytest tests/ingest -q', output: '14 passed in 1.83s' },
          { role: 'assistant', text: '14 tests added, all green. Coverage on ingest/ moved from 12% to 71%.' },
          { role: 'user', text: 'Great, thank you!' }
        ]
      }
    ];
  }

  function loadThreads() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    var seeded = seedThreads();
    saveThreads(seeded);
    return seeded;
  }
  function saveThreads(threads) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(threads)); } catch (e) {}
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  var params = new URLSearchParams(window.location.search);
  var threadId = params.get('id');
  var threads = loadThreads();
  var thread = threads.find(function (t) { return t.id === threadId; });

  if (!thread) {
    document.querySelector('.term-window').hidden = true;
    document.getElementById('not-found').hidden = false;
  } else {
    init();
  }

  function init() {
    document.getElementById('thread-title').textContent = thread.title;
    document.title = thread.title + ' — codex';
    renderSidebar();
    renderMeta();
    renderTranscript();
    wireEvents();
  }

  function navigateTo(id) { window.location.href = 'conversation.html?id=' + encodeURIComponent(id); }

  function renderSidebar() {
    var el = document.getElementById('conv-sidebar');
    el.innerHTML = '';
    threads.forEach(function (t) {
      var row = document.createElement('div');
      row.className = 'sidebar-row' + (t.id === thread.id ? ' is-current' : '') + (t.status === 'open' ? ' is-open' : ' is-finished');
      row.setAttribute('data-od-id', 'sidebar-row-' + t.id);
      row.innerHTML =
        '<span class="sidebar-row-title"><span class="sidebar-status-dot" aria-hidden="true"></span>' + escapeHtml(t.title) + '</span>' +
        '<span class="sidebar-row-meta">' + escapeHtml(t.model) + ' · ' + escapeHtml(t.profile) + '</span>';
      row.addEventListener('click', function () { if (t.id !== thread.id) navigateTo(t.id); });
      el.appendChild(row);
    });
  }

  function shiftThread(delta) {
    var idx = threads.findIndex(function (t) { return t.id === thread.id; });
    if (idx === -1) return;
    var nextIdx = Math.max(0, Math.min(threads.length - 1, idx + delta));
    if (nextIdx !== idx) navigateTo(threads[nextIdx].id);
  }

  function renderMeta() {
    var meta = document.getElementById('conv-meta');
    var statusLabel = thread.status === 'open' ? 'Running' : 'Finished';
    var statusDetail = thread.status === 'open' ? '<span class="muted">· detached, safe to close</span>' : '';
    meta.innerHTML =
      '<div class="conv-info-head"><span class="prompt-glyph">&gt;_</span> <strong>' + escapeHtml(thread.title) + '</strong></div>' +
      '<div class="conv-info-row">' +
        '<span><span class="info-label">model:</span><span class="info-value">' + escapeHtml(thread.model) + '</span></span>' +
        '<span><span class="info-label">profile:</span><span class="info-value">' + escapeHtml(thread.profile) + '</span></span>' +
      '</div>' +
      '<div class="conv-info-row">' +
        '<span><span class="info-label">directory:</span><span class="info-value">' + escapeHtml(thread.repo) + '/' + escapeHtml(thread.branch) + '</span></span>' +
      '</div>' +
      '<div class="status-line ' + (thread.status === 'open' ? 'is-open' : 'is-finished') + '">' +
        '<span class="status-dot" aria-hidden="true"></span><strong>' + statusLabel + '</strong> ' + statusDetail +
      '</div>';
  }

  function highlightMentions(escaped) {
    return escaped.replace(/(^|\s)@([\w.\/-]+)/g, function (whole, pre, token) {
      return pre + '<span class="mention">@' + token + '</span>';
    });
  }

  function renderMessage(m) {
    var wrap = document.createElement('div');
    if (m.role === 'tool') {
      wrap.className = 'msg-tool';
      wrap.innerHTML = '<div class="tool-cmd">$ ' + escapeHtml(m.cmd) + '</div><pre class="tool-output">' + escapeHtml(m.output) + '</pre>';
    } else if (m.role === 'user') {
      wrap.className = 'msg-user';
      wrap.innerHTML = '<span class="row-prompt">›</span><div class="msg-text">' + highlightMentions(escapeHtml(m.text)) + '</div>';
    } else {
      wrap.className = 'msg-assistant';
      wrap.innerHTML = '<div class="msg-role">codex</div><div class="msg-text">' + highlightMentions(escapeHtml(m.text)) + '</div>';
    }
    return wrap;
  }

  function renderTranscript() {
    var el = document.getElementById('transcript');
    el.innerHTML = '';
    thread.messages.forEach(function (m) { el.appendChild(renderMessage(m)); });
    el.scrollTop = el.scrollHeight;
  }

  function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(160, el.scrollHeight) + 'px'; }

  function send() {
    var input = document.getElementById('composer-input');
    var text = input.value.trim();
    if (!text) return;
    thread.messages.push({ role: 'user', text: text });
    thread.updatedAt = Date.now();
    thread.status = 'open';
    saveThreads(threads);
    input.value = '';
    autoGrow(input);
    renderTranscript();
    renderMeta();
  }

  function goBack() { window.location.href = 'index.html'; }

  function wireEvents() {
    document.getElementById('back-btn').addEventListener('click', goBack);
    document.getElementById('send-btn').addEventListener('click', send);

    var input = document.getElementById('composer-input');
    input.addEventListener('input', function () { autoGrow(input); });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      else if (e.key === 'Escape') { e.stopPropagation(); input.blur(); }
    });

    document.addEventListener('keydown', function (e) {
      var focused = document.activeElement === input;
      if (e.key === 'Escape' && !focused) { goBack(); return; }
      if (focused) return;
      switch (e.key) {
        case 'ArrowDown': case 'j': e.preventDefault(); shiftThread(1); break;
        case 'ArrowUp': case 'k': e.preventDefault(); shiftThread(-1); break;
      }
    });
  }
</script>
</body>
</html>
